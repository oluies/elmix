<!doctype html>
<html lang="sv" data-lang="sv">
<head>
  <meta charset="utf-8">
  <title>Elmix – förbrukningsmix DE vs FR</title>
  <script src="vendor/echarts.min.js"></script>
  <script src="data/consumption-eu-data.js"></script>
  <style>
    body { font-family: -apple-system, system-ui, sans-serif; margin: 0 auto;
           max-width: 1300px; padding: 0 16px 48px; color: #222; }
    h1 { font-size: 20px; margin-top: 24px; }
    .lead { color: #555; font-size: 14px; line-height: 1.5; max-width: 900px; }
    .controls { margin: 14px 0 6px; font-size: 14px; display: flex; gap: 26px; flex-wrap: wrap; align-items: center; }
    .controls fieldset { border: 1px solid #e3e8ef; border-radius: 8px; padding: 4px 12px 8px; margin: 0; }
    .controls legend { font-size: 12px; color: #777; padding: 0 4px; }
    .toolbar { font-size: 13px; }
    .toolbar button { font: inherit; padding: 3px 10px; border: 1px solid #c9d2e0;
                      background: #fff; border-radius: 6px; cursor: pointer; margin-right: 6px; }
    .toolbar button:disabled { opacity: 0.4; cursor: default; }
    .toolbar .hint { color: #888; margin-left: 8px; }
    .clocks { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 8px; }
    .chart { flex: 1 1 520px; height: 580px; min-width: 380px;
             background: #fafbfd; border: 1px solid #e3e8ef; border-radius: 10px; }
    footer { margin-top: 36px; padding-top: 12px; border-top: 1px solid #ddd; font-size: 13px; color: #666; }
    footer a { color: #36c; }
    .topnav { display: flex; gap: 16px; align-items: baseline; flex-wrap: wrap;
              padding: 10px 0 8px; margin-bottom: 4px; border-bottom: 1px solid #e3e8ef; font-size: 14px; }
    .topnav .brand { font-weight: 600; color: #333; margin-right: 4px; }
    .topnav a { color: #36c; text-decoration: none; }
    .topnav a:hover { text-decoration: underline; }
    .topnav a.current { color: #222; font-weight: 600; cursor: default; }
    .langswitch { margin-left: auto; display: inline-flex; }
    .langswitch button { font: inherit; font-size: 12px; padding: 2px 9px; border: 1px solid #c9d2e0;
                         background: #fff; cursor: pointer; color: #36c; border-left: none; }
    .langswitch button:first-child { border-left: 1px solid #c9d2e0; border-radius: 6px 0 0 6px; }
    .langswitch button:last-child { border-radius: 0 6px 6px 0; }
    .langswitch button.active { background: #36c; color: #fff; border-color: #36c; }
  </style>
</head>
<body>
  <nav class="topnav">
    <span class="brand">Elmix</span>
    <a href="index.html">Interaktiv</a>

    <span id="lang-switch" class="langswitch"></span>
  </nav>

  <h1 id="eu-title">Förbrukningsmix: Tyskland vs Frankrike</h1>
  <p class="lead" id="eu-lead"></p>

  <div class="controls">
    <fieldset id="year-picker"><legend>År (FBMC)</legend></fieldset>
    <div class="toolbar" id="eu-toolbar" style="display:none">
      <button id="eu-prev">‹</button>
      <button id="eu-next">›</button>
      <button id="eu-back">←</button>
      <span class="hint" id="eu-daylabel"></span>
    </div>
  </div>

  <div class="clocks">
    <div id="clock-DE_LU" class="chart"></div>
    <div id="clock-FR" class="chart"></div>
  </div>
