  <script>
    // Slå ihop SE-zoner (elmixConsumption) + DE/FR (elmixEu). Tolerant om DE/FR
    // saknas (då visas bara SE). co2Heat hanterar båda kolumnuppsättningarna.
    (function () {
      var se = window.elmixConsumption || { zones: [], years: [2025, 2026], data: [] }
      var eu = window.elmixEu || { zones: [], years: [2025, 2026], data: [] }
      window.CO2_CFG = {
        data: { zones: se.zones.concat(eu.zones), years: se.years, data: se.data.concat(eu.data) },
        langs: ['sv', 'en', 'fr', 'de'],
        label: function (z) { return z === 'DE_LU' ? 'DE' : z.replace('_', '') },
        texts: {
          title: ['CO₂-intensitet: alla zoner (SE1–4, DE, FR)', 'CO₂ intensity: all zones (SE1–4, DE, FR)',
            'Intensité CO₂ : toutes zones (SE1–4, DE, FR)', 'CO₂-Intensität: alle Zonen (SE1–4, DE, FR)'],
          lead: ['Grön = ren el, röd = fossil, över hela året i timupplösning. Intensitet = Σ(kraftslag × utsläppsfaktor) / produktion. Antaget (gCO₂/kWh): kol ~950, gas ~490, kärnkraft/vind/sol/vatten ~0, övrigt ~300, SE kraftvärme ~100; import exkluderas. De svenska zonerna nästan noll (vatten/kärnkraft/vind), DE ~325, FR ~18.',
            'Green = clean, red = fossil, whole year at hourly resolution. Intensity = Σ(source × emission factor) / generation. Assumed (gCO₂/kWh): coal ~950, gas ~490, nuclear/wind/solar/hydro ~0, other ~300, SE CHP ~100; imports excluded. Swedish zones near zero (hydro/nuclear/wind), DE ~325, FR ~18.',
            'Vert = propre, rouge = fossile, toute l’année en résolution horaire. Intensité = Σ(source × facteur) / production. Hypothèses (gCO₂/kWh) : charbon ~950, gaz ~490, nucléaire/éolien/solaire/hydro ~0, autres ~300, cogé. SE ~100 ; imports exclus. Zones suédoises quasi nulles, DE ~325, FR ~18.',
            'Grün = sauber, rot = fossil, ganzes Jahr stündlich. Intensität = Σ(Quelle × Faktor) / Erzeugung. Annahme (gCO₂/kWh): Kohle ~950, Gas ~490, Kernkraft/Wind/Solar/Wasser ~0, Sonstige ~300, SE-KWK ~100; Importe ausgeschlossen. Schwedische Zonen nahe null, DE ~325, FR ~18.'],
          yr: ['År (FBMC)', 'Year (FBMC)', 'Année (FBMC)', 'Jahr (FBMC)']
        }
      }
    })()
  </script>
