  <script>
    window.MULTI_CFG = {
      data: window.elmixConsumption,
      langs: ['sv', 'en'],
      label: z => z.replace('_', ''),
      fuels: [
        { key: 'v',   name: 'Vind',           nameEn: 'Wind',       c: '#5470c6' },
        { key: 's',   name: 'Sol',            nameEn: 'Solar',      c: '#fac858' },
        { key: 'va',  name: 'Vattenkraft',    nameEn: 'Hydro',      c: '#91cc75' },
        { key: 'k',   name: 'Kärnkraft',      nameEn: 'Nuclear',    c: '#ee6666' },
        { key: 'kv',  name: 'Kraftvärme/övr', nameEn: 'CHP/other',  c: '#73c0de' },
        { key: 'imp', name: 'Import (netto)', nameEn: 'Net import', c: '#9aa7b8' }
      ],
      texts: {
        title: ['Förbrukningsmix – alla svenska elområden', 'Consumption mix – all Swedish bidding zones'],
        lead: ['Alla fyra elområdena (SE1–SE4) samtidigt. Förbrukningsmix = produktion + nettoimport (grå kil = import). Klicka på en dag → alla fyra klockor drillar till samma dygn. FBMC-eran (2025/2026).',
          'All four bidding zones (SE1–SE4) at once. Consumption mix = generation + net imports (grey wedge = imports). Click a day → all four clocks drill to the same day. FBMC era (2025/2026).'],
        back: ['← Helår', '← Full year'],
        prev: ['‹ Föreg. dag', '‹ Prev day'],
        next: ['Nästa dag ›', 'Next day ›'],
        yr: ['År (FBMC)', 'Year (FBMC)']
      }
    }
  </script>
