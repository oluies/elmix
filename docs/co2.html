  <script>
    window.CO2_CFG = {
      data: window.elmixEu,
      langs: ['sv', 'en', 'fr', 'de'],
      label: z => z === 'DE_LU' ? 'DE' : 'FR',
      texts: {
        title: ['CO₂-intensitet: Tyskland vs Frankrike', 'CO₂ intensity: Germany vs France',
          'Intensité CO₂ : Allemagne vs France', 'CO₂-Intensität: Deutschland vs Frankreich'],
        lead: ['Grön = ren el, röd = fossil, över hela året i timupplösning. Intensitet = Σ(kraftslag × utsläppsfaktor) / produktion. Antaget (gCO₂/kWh): kol ~950, gas ~490, kärnkraft/vind/sol/vatten ~0, övrigt ~300; import exkluderas (okänt ursprung). FR:s kärnkraft ger ~50, DE:s kol/gas ~350–400.',
          'Green = clean power, red = fossil, across the whole year at hourly resolution. Intensity = Σ(source × emission factor) / generation. Assumed (gCO₂/kWh): coal ~950, gas ~490, nuclear/wind/solar/hydro ~0, other ~300; imports excluded (unknown origin). FR nuclear gives ~50, DE coal/gas ~350–400.',
          'Vert = électricité propre, rouge = fossile, sur toute l’année en résolution horaire. Intensité = Σ(source × facteur d’émission) / production. Hypothèses (gCO₂/kWh) : charbon ~950, gaz ~490, nucléaire/éolien/solaire/hydro ~0, autres ~300 ; imports exclus. Le nucléaire FR ~50, charbon/gaz DE ~350–400.',
          'Grün = sauberer Strom, rot = fossil, übers ganze Jahr in Stundenauflösung. Intensität = Σ(Quelle × Emissionsfaktor) / Erzeugung. Annahme (gCO₂/kWh): Kohle ~950, Gas ~490, Kernkraft/Wind/Solar/Wasser ~0, Sonstige ~300; Importe ausgeschlossen. FR-Kernkraft ~50, DE-Kohle/Gas ~350–400.'],
        yr: ['År (FBMC)', 'Year (FBMC)', 'Année (FBMC)', 'Jahr (FBMC)']
      }
    }
  </script>
